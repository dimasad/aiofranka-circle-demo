services:
  dev:
    image: aiofranka
    working_dir: /workspace
    volumes:
      - .:/workspace
    privileged: true
    network_mode: host
    environment:
      - DISPLAY=:99
    # Start a virtual framebuffer so MuJoCo's GLFW viewer has a display,
    # then park the container alive for interactive use.
    command: >
      bash -c "Xvfb :99 -screen 0 1280x720x24 -ac +extension GLX +render -noreset &
               sleep 0.5 &&
               sleep infinity"
